{% extends "base.html" %}
{% block content %}

<section class="auth-card">
    <div class="auth-header">
        <h2>Registro de usuario</h2>
        <p>Crea una cuenta para acceder al sistema</p>
    </div>

    <form method="post" action="{{ url_for('auth.register') }}">
        <label for="username">Nombre de usuario</label>
        <input type="text" id="username" name="username" placeholder="Ingresa tu nombre de usuario" required />

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Crea una contraseña" required />

        <label for="confirm">Confirmar contraseña</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repite tu contraseña" required />

        <button type="submit">Crear cuenta</button>
    </form>

    <p class="auth-link">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
    </p>
</section>

{% endblock %}
